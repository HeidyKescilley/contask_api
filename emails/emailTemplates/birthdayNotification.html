<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Feliz Aniversário!</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f4f4f4;
        color: #333;
      }
      .container {
        background-color: #ffffff;
        padding: 20px;
        border-radius: 8px;
        max-width: 600px;
        margin: auto;
      }
      .header {
        font-size: 1.2em;
        font-weight: bold;
        margin-bottom: 20px;
        color: #0056b3;
      }
      .content p {
        line-height: 1.6;
      }
      .footer {
        margin-top: 20px;
        font-size: 0.9em;
        text-align: left;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">Lembrete de Aniversário - Contask</div>
      <div class="content">
        <p>Olá,</p>
        <p>
          Gostaríamos de desejar um feliz aniversário para
          <strong>{{userName}}</strong> do departamento
          <strong>{{department}}</strong>!
        </p>
        <p>
          Desejamos um dia incrível e um novo ano de vida repleto de sucesso e
          felicidade.
        </p>
      </div>
      <div class="footer">
        <p>Atenciosamente,</p>
        <p>Equipe Contask</p>
      </div>
    </div>
  </body>
</html>
